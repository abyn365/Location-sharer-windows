name: build & release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore app
        working-directory: src/LocationSharer
        run: dotnet restore

      - name: Publish single-file app
        working-directory: src/LocationSharer
        run: >
          dotnet publish
          -c Release
          -r win-x64
          /p:PublishSingleFile=true
          /p:SelfContained=true
          /p:IncludeNativeLibrariesForSelfExtract=true

      - name: Restore installer
        working-directory: installer
        run: dotnet restore

      - name: Build installer
        working-directory: installer
        run: dotnet build -c Release

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocationSharer-EXE
          path: src/LocationSharer/bin/Release/net8.0-windows10.0.22621.0/win-x64/publish/LocationSharer.exe

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocationSharer-MSI
          path: installer/bin/Release/**/*.msi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            src/LocationSharer/bin/Release/net8.0-windows10.0.22621.0/win-x64/publish/LocationSharer.exe
            installer/bin/Release/**/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}